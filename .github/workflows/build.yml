name: 제킬 블로그 자동 빌드 및 배포

on:
  push:
    branches: ["master"]
  workflow_dispatch: # 수동 빌드 버튼

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: 1단계 - 사이트 빌드 및 압축
    runs-on: ubuntu-latest
    steps:
      - name: "[소스코드] 레포지토리 가져오기"
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: "[환경설정] Ruby 및 캐시 세팅"
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true # Gem 설치 및 캐싱 자동화

      # Warning 회피를 위한 주석 처리 (2026.7.5)
      # - name: Setup Pages
      #   uses: actions/configure-pages@v5

      - name: "[실행] 제킬 빌드 수행 (실패 시 1회 자동 재시도)"
        uses: nick-fields/retry@v4
        with:
          timeout_seconds: 300 # 단일 시도당 제한 시간 (5분)
          max_attempts: 2      # 실패 시 최대 2번까지 재시도
          command: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: "[아티팩트] 빌드 결과물 임시 업로드"
        uses: actions/upload-pages-artifact@v5

  deploy:
    name: 2단계 - 깃허브 서버에 최종 게시
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: "[배포] GitHub Pages 활성화"
        id: deployment
        uses: actions/deploy-pages@v5
