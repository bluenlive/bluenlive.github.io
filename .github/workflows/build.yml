name: Deploy Jekyll (+Manual)

on:
  push:
    branches: ["master"]
  workflow_dispatch: # 수동 빌드 버튼

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true # Gem 설치 및 캐싱 자동화

      # Warning 회피를 위한 주석 처리 (2026.7.5)
      # - name: Setup Pages
      #   uses: actions/configure-pages@v5

      - name: Build with Jekyll (with 1 Retry)
        uses: nick-fields/retry@v4
        with:
          timeout_seconds: 300 # 단일 시도당 제한 시간 (5분)
          max_attempts: 2      # 실패 시 최대 2번까지 재시도
          command: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
